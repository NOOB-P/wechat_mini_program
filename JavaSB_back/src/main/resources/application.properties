spring.application.name=JavaSB_back
# 配置后端服务端口，默认 8082 (与前端 VITE_API_PROXY_URL 对应)
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/edu_data?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 全局应用配置 (对应 GlobalConfigProperties 类)
# ==========================================
# 默认初始密码
app.config.default-password=123456
# JWT 加密密钥 (生产环境建议更换为长随机字符串)
app.config.jwt-secret=your_super_secret_key_for_jwt_token_generation_with_at_least_256_bits
# JWT 过期时间 (毫秒)，默认24小时 (24 * 60 * 60 * 1000)
app.config.jwt-expiration=86400000
# 微信小程序 AppID (请替换为真实AppID)
app.config.wechat-app-id=wxd18b4cd16e9e909f
# 微信小程序 AppSecret (请替换为真实AppSecret)
app.config.wechat-app-secret=68efdbfd5ad540ed834f194ce379bc56
# 文件上传保存的本地目录 (采用 resources 内部路径，确保多设备可移植性)
app.config.upload-dir=src/main/resources/uploads/code/
# 试卷 PDF 专门存放目录
app.config.paper-dir=src/main/resources/uploads/papers/
# 通义千问成绩分析配置
app.config.qwen-api-key=${QWEN_API_KEY:}
app.config.qwen-chat-url=${QWEN_CHAT_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
app.config.qwen-model=${QWEN_MODEL:qwen3.6-plus}
app.config.qwen-prompt-version=${QWEN_PROMPT_VERSION:qwen-score-report-v1}
# 阿里云 OCR 试卷切题配置
app.config.aliyun-ocr-access-key-id=${ALIYUN_OCR_ACCESS_KEY_ID:}
app.config.aliyun-ocr-access-key-secret=${ALIYUN_OCR_ACCESS_KEY_SECRET:}
app.config.aliyun-ocr-endpoint=${ALIYUN_OCR_ENDPOINT:ocr-api.cn-hangzhou.aliyuncs.com}
app.config.aliyun-ocr-subject-default=${ALIYUN_OCR_SUBJECT_DEFAULT:default}
app.config.aliyun-ocr-image-type=${ALIYUN_OCR_IMAGE_TYPE:scan}
app.config.aliyun-ocr-cut-type=${ALIYUN_OCR_CUT_TYPE:question}
app.config.aliyun-ocr-output-ori-coord=${ALIYUN_OCR_OUTPUT_ORI_COORD:false}

# ==========================================
# 数据库连接池优化
# ==========================================
# 解决链接失效 WARN (No operations allowed after connection closed)
# 连接最大存活时间，建议比 MySQL 的 wait_timeout (默认 8小时) 短，设置 10分钟
spring.datasource.hikari.max-lifetime=600000
# 连接空闲最大存活时间
spring.datasource.hikari.idle-timeout=300000
# 连接池中维护的最小空闲连接
spring.datasource.hikari.minimum-idle=5
# 连接池最大连接数
spring.datasource.hikari.maximum-pool-size=20
# 连接超时时间
spring.datasource.hikari.connection-timeout=30000

# JPA 配置：停止自动创建表
spring.jpa.hibernate.ddl-auto=none
# 显示 SQL 语句 (可选，方便调试)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# 解决启动时的 WARN
spring.jpa.open-in-view=false

# ==========================================
# 文件上传限制配置
# ==========================================
# 单个文件的最大限制
spring.servlet.multipart.max-file-size=500MB
# 单个请求的最大限制 (包含多个文件)
spring.servlet.multipart.max-request-size=500MB
