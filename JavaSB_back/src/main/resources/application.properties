spring.application.name=JavaSB_back
spring.datasource.url=jdbc:mysql://localhost:3306/edu_data?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 全局应用配置 (对应 GlobalConfigProperties 类)
# ==========================================
# 默认初始密码
app.config.default-password=123456
# JWT 加密密钥 (生产环境建议更换为长随机字符串)
app.config.jwt-secret=your_super_secret_key_for_jwt_token_generation_with_at_least_256_bits
# JWT 过期时间 (毫秒)，默认24小时 (24 * 60 * 60 * 1000)
app.config.jwt-expiration=86400000
# 微信小程序 AppID (请替换为真实AppID)
app.config.wechat-app-id=your_wechat_app_id
# 微信小程序 AppSecret (请替换为真实AppSecret)
app.config.wechat-app-secret=your_wechat_app_secret
# 文件上传保存的本地目录 (采用 resources 内部路径，确保多设备可移植性)
app.config.upload-dir=src/main/resources/uploads/code/
