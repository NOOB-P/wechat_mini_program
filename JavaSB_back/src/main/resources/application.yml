spring:
  application:
    name: JavaSB_back
  datasource:
    dynamic:
      enabled: true
      primary: master
      strict: false
      grace-destroy: true
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/edu_data?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: root
          password: root123
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            max-lifetime: 600000
            idle-timeout: 300000
            minimum-idle: 5
            maximum-pool-size: 20
            connection-timeout: 30000
        slave:
          # Keep slave pointing to master for now; switch the connection later when replication is ready.
          url: jdbc:mysql://localhost:3306/edu_data?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: root
          password: root123
          driver-class-name: com.mysql.cj.jdbc.Driver
          hikari:
            max-lifetime: 600000
            idle-timeout: 300000
            minimum-idle: 5
            maximum-pool-size: 20
            connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

